name: Desktop Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    name: Build for ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    timeout-minutes: 60

    strategy:
      fail-fast: false
      matrix:
        include:
          - os: windows-latest
            artifact_name: Voxxera-POS-Windows
            artifact_ext: "*.exe"
          - os: macos-latest
            artifact_name: Voxxera-POS-macOS
            artifact_ext: "*.dmg"

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup PHP 8.2
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.2'
          extensions: mysqli, bcmath, intl, gd, zip, mbstring, curl, xml
          coverage: none

      - name: Setup Node.js 22
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Cache Node Modules
        uses: actions/cache@v4
        with:
          path: node_modules
          key: ${{ runner.os }}-node-${{ hashFiles('package.json') }}
          restore-keys: ${{ runner.os }}-node-

      - name: Install Composer Dependencies
        run: composer install --no-dev --optimize-autoloader --no-interaction

      - name: Install NPM Dependencies
        run: npm install

      # ── Windows: download portable PHP so app works without system PHP ──────
      - name: Bundle Portable PHP (Windows)
        if: matrix.os == 'windows-latest'
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force -Path desktop/bin/php | Out-Null
          $url = "https://windows.php.net/downloads/releases/php-8.2.28-Win32-vs16-x64.zip"
          Write-Host "Downloading PHP from $url"
          Invoke-WebRequest -Uri $url -OutFile "php.zip" -TimeoutSec 120
          Expand-Archive -Path "php.zip" -DestinationPath "desktop/bin/php" -Force
          Remove-Item "php.zip"
          # Enable required extensions in php.ini
          $iniSrc = "desktop/bin/php/php.ini-production"
          $iniDst = "desktop/bin/php/php.ini"
          if (Test-Path $iniSrc) {
            Copy-Item $iniSrc $iniDst
            (Get-Content $iniDst) -replace ';extension=mysqli', 'extension=mysqli' `
              -replace ';extension=intl', 'extension=intl' `
              -replace ';extension=gd', 'extension=gd' `
              -replace ';extension=mbstring', 'extension=mbstring' `
              -replace ';extension=openssl', 'extension=openssl' | Set-Content $iniDst
          }
          Write-Host "PHP bundled:"
          & "desktop/bin/php/php.exe" -v

      # ── macOS: copy the system PHP (already set up by shivammathur) ─────────
      - name: Bundle System PHP (macOS)
        if: matrix.os == 'macos-latest'
        run: |
          mkdir -p desktop/bin/php
          PHP_BIN=$(which php)
          echo "Copying PHP from: $PHP_BIN"
          cp "$PHP_BIN" desktop/bin/php/php
          chmod +x desktop/bin/php/php
          desktop/bin/php/php -v

      # ── Build Electron installers ────────────────────────────────────────────
      - name: Build Desktop App (Windows)
        if: matrix.os == 'windows-latest'
        shell: pwsh
        run: npx electron-builder --win --x64 --publish never
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Build Desktop App (macOS)
        if: matrix.os == 'macos-latest'
        run: npx electron-builder --mac --x64 --arm64 --publish never
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          CSC_IDENTITY_AUTO_DISCOVERY: false

      # ── Debug: list generated files ─────────────────────────────────────────
      - name: List Output Files
        shell: bash
        run: |
          echo "=== dist-desktop contents ==="
          ls -lh dist-desktop/ 2>/dev/null || echo "dist-desktop not found!"

      # ── Upload artifacts (always available for download from Actions) ────────
      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact_name }}
          path: dist-desktop/${{ matrix.artifact_ext }}
          if-no-files-found: error

      # ── Attach to GitHub Release when triggered by a version tag ────────────
      - name: Attach to GitHub Release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: |
            dist-desktop/*.exe
            dist-desktop/*.dmg
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
