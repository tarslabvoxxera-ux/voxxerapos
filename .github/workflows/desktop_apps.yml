name: Desktop Release

# ─────────────────────────────────────────────────────────────────────────────
# Triggers
#   • Any push to `main` or `master`  →  auto-bump a patch version tag and
#     build Windows + macOS installers, then attach them to a GitHub Release.
#   • Manual trigger (workflow_dispatch) with optional custom version tag.
#   • Direct tag push (v*) for manual release tagging from the CLI.
# ─────────────────────────────────────────────────────────────────────────────
on:
  push:
    branches:
      - main
      - master
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      version_tag:
        description: 'Release tag (e.g. v3.4.3). Leave blank to auto-increment.'
        required: false
        default: ''

permissions:
  contents: write

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

# ─────────────────────────────────────────────────────────────────────────────
# Job 1 – Auto-tag on push to main/master
#   Reads the current highest vX.Y.Z tag and pushes vX.Y.(Z+1).
#   Skipped when the push is itself a tag, or on workflow_dispatch with tag.
# ─────────────────────────────────────────────────────────────────────────────
jobs:
  auto_tag:
    name: Auto-bump version tag
    runs-on: ubuntu-latest
    if: |
      github.event_name == 'push' &&
      !startsWith(github.ref, 'refs/tags/')
    outputs:
      new_tag: ${{ steps.bump.outputs.new_tag }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0          # need full history for tag listing

      - name: Bump patch version
        id: bump
        shell: bash
        run: |
          # Find the latest semver tag; default to v0.0.0 if none exist
          LATEST=$(git tag --list 'v*.*.*' --sort=-version:refname | head -1)
          LATEST=${LATEST:-v0.0.0}
          echo "Latest tag: $LATEST"

          # Split into parts and increment patch
          IFS='.' read -r MAJOR MINOR PATCH <<< "${LATEST#v}"
          NEW_TAG="v${MAJOR}.${MINOR}.$((PATCH + 1))"
          echo "New tag   : $NEW_TAG"
          echo "new_tag=$NEW_TAG" >> "$GITHUB_OUTPUT"

      - name: Push new tag
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          TAG=${{ steps.bump.outputs.new_tag }}
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git tag "$TAG" -m "Auto-release $TAG"
          git push origin "$TAG"

  # ───────────────────────────────────────────────────────────────────────────
  # Job 2 – Build Windows + macOS Electron installers
  # ───────────────────────────────────────────────────────────────────────────
  build:
    name: Build for ${{ matrix.os }}
    needs: [auto_tag]
    if: always() && (needs.auto_tag.result == 'success' || needs.auto_tag.result == 'skipped')
    runs-on: ${{ matrix.os }}
    timeout-minutes: 90

    strategy:
      fail-fast: false
      matrix:
        include:
          - os: windows-latest
            artifact_name: Voxxera-POS-Windows
            artifact_ext: "*.exe"
          - os: macos-12
            artifact_name: Voxxera-POS-macOS
            artifact_ext: "*.dmg"

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup PHP 8.2
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.2'
          extensions: mysqli, bcmath, intl, gd, zip, mbstring, curl, xml, pdo, pdo_mysql, pdo_sqlite, fileinfo, tokenizer, openssl
          coverage: none

      - name: Setup Node.js 22
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Cache Node Modules
        uses: actions/cache@v4
        with:
          path: node_modules
          key: ${{ runner.os }}-node-${{ hashFiles('package-lock.json', 'package.json') }}
          restore-keys: ${{ runner.os }}-node-

      - name: Cache Composer
        uses: actions/cache@v4
        with:
          path: vendor
          key: ${{ runner.os }}-composer-${{ hashFiles('composer.lock') }}
          restore-keys: ${{ runner.os }}-composer-

      - name: Install Composer Dependencies
        run: composer install --no-dev --optimize-autoloader --no-interaction

      - name: Install NPM Dependencies
        run: npm install

      - name: Bundle Portable PHP & MariaDB (Windows)
        if: matrix.os == 'windows-latest'
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force -Path desktop/bin/php | Out-Null
          $phpExe = (Get-Command php).Source
          $phpDir = Split-Path $phpExe -Parent
          Copy-Item "$phpDir\*" "desktop\bin\php\" -Recurse -Force
          & "desktop\bin\php\php.exe" -v
          
          $ini = "extension_dir = `"ext`"`n" +
                 "extension=mysqli`n" +
                 "extension=pdo_mysql`n" +
                 "extension=pdo_sqlite`n" +
                 "extension=mbstring`n" +
                 "extension=curl`n" +
                 "extension=gd`n" +
                 "extension=intl`n" +
                 "extension=zip`n" +
                 "extension=fileinfo`n" +
                 "extension=openssl"
          Add-Content "desktop\bin\php\php.ini" $ini

          # Bundle MariaDB for Windows
          New-Item -ItemType Directory -Force -Path desktop/bin/mariadb | Out-Null
          Invoke-WebRequest -Uri "https://archive.mariadb.org/mariadb-10.6.14/winx64-packages/mariadb-10.6.14-winx64.zip" -OutFile mariadb.zip
          Expand-Archive -Path mariadb.zip -DestinationPath . -Force
          Move-Item mariadb-10.6.14-winx64\* desktop\bin\mariadb\

      - name: Bundle System PHP (macOS)
        if: matrix.os == 'macos-12'
        run: |
          mkdir -p desktop/bin/php
          cp $(which php) desktop/bin/php/php
          chmod +x desktop/bin/php/php
          desktop/bin/php/php -v

      - name: Build Desktop App
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          NODE_OPTIONS: "--max-old-space-size=8192"
        run: |
          if [ "${{ matrix.os }}" = "windows-latest" ]; then
            npx electron-builder --win --x64 --publish never
          else
            npx electron-builder --mac --x64 --publish never
          fi
        shell: bash

      - name: Verify build output
        shell: bash
        run: |
          ls -lh dist-desktop/
          if [ -z "$(ls dist-desktop/*.exe dist-desktop/*.dmg 2>/dev/null)" ]; then
            echo "No installer found."
            exit 1
          fi

      - name: Upload Build Artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact_name }}
          path: dist-desktop/${{ matrix.artifact_ext }}
          if-no-files-found: error

  # ───────────────────────────────────────────────────────────────────────────
  # Job 3 – Create Release and Attach All Artifacts
  # ───────────────────────────────────────────────────────────────────────────
  release:
    name: Create GitHub Release
    needs: [auto_tag, build]
    runs-on: ubuntu-latest
    if: always() && (needs.build.result == 'success')
    steps:
      - name: Download All Artifacts
        uses: actions/download-artifact@v4
        with:
          path: ./release-artifacts
          merge-multiple: true

      - name: Resolve release tag
        id: resolve_tag
        shell: bash
        run: |
          if [[ "${{ github.event_name }}" == "workflow_dispatch" && -n "${{ github.event.inputs.version_tag }}" ]]; then
            echo "tag=${{ github.event.inputs.version_tag }}" >> "$GITHUB_OUTPUT"
          elif [[ "${{ github.ref }}" == refs/tags/* ]]; then
            echo "tag=${GITHUB_REF#refs/tags/}" >> "$GITHUB_OUTPUT"
          else
            echo "tag=${{ needs.auto_tag.outputs.new_tag }}" >> "$GITHUB_OUTPUT"
          fi

      - name: Create or Update Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.resolve_tag.outputs.tag }}
          name: "Voxxera POS ${{ steps.resolve_tag.outputs.tag }}"
          draft: false
          prerelease: false
          generate_release_notes: true
          files: ./release-artifacts/**
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
