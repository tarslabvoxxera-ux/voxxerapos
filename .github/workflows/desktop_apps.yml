name: Desktop Release

# ─────────────────────────────────────────────────────────────────────────────
# Triggers
#   • Any push to `main` or `master`  →  auto-bump a patch version tag and
#     build Windows + macOS installers, then attach them to a GitHub Release.
#   • Manual trigger (workflow_dispatch) with optional custom version tag.
#   • Direct tag push (v*) for manual release tagging from the CLI.
# ─────────────────────────────────────────────────────────────────────────────
on:
  push:
    branches:
      - main
      - master
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      version_tag:
        description: 'Release tag (e.g. v3.4.3). Leave blank to auto-increment.'
        required: false
        default: ''

permissions:
  contents: write

# ─────────────────────────────────────────────────────────────────────────────
# Job 1 – Auto-tag on push to main/master
#   Reads the current highest vX.Y.Z tag and pushes vX.Y.(Z+1).
#   Skipped when the push is itself a tag, or on workflow_dispatch with tag.
# ─────────────────────────────────────────────────────────────────────────────
jobs:
  auto_tag:
    name: Auto-bump version tag
    runs-on: ubuntu-latest
    if: |
      github.event_name == 'push' &&
      !startsWith(github.ref, 'refs/tags/')
    outputs:
      new_tag: ${{ steps.bump.outputs.new_tag }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0          # need full history for tag listing

      - name: Bump patch version
        id: bump
        shell: bash
        run: |
          # Find the latest semver tag; default to v0.0.0 if none exist
          LATEST=$(git tag --list 'v*.*.*' --sort=-version:refname | head -1)
          LATEST=${LATEST:-v0.0.0}
          echo "Latest tag: $LATEST"

          # Split into parts and increment patch
          IFS='.' read -r MAJOR MINOR PATCH <<< "${LATEST#v}"
          NEW_TAG="v${MAJOR}.${MINOR}.$((PATCH + 1))"
          echo "New tag   : $NEW_TAG"
          echo "new_tag=$NEW_TAG" >> "$GITHUB_OUTPUT"

      - name: Push new tag
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          TAG=${{ steps.bump.outputs.new_tag }}
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git tag "$TAG" -m "Auto-release $TAG"
          git push origin "$TAG"

  # ───────────────────────────────────────────────────────────────────────────
  # Job 2 – Build Windows + macOS Electron installers
  # ───────────────────────────────────────────────────────────────────────────
  build:
    name: Build for ${{ matrix.os }}

    # Run after auto_tag (when triggered from main/master), or immediately
    # when triggered by a vX tag push or workflow_dispatch.
    needs: [auto_tag]
    if: always() && (needs.auto_tag.result == 'success' || needs.auto_tag.result == 'skipped')

    runs-on: ${{ matrix.os }}
    timeout-minutes: 90

    strategy:
      fail-fast: false
      matrix:
        include:
          - os: windows-latest
            artifact_name: Voxxera-POS-Windows
            artifact_ext: "*.exe"
          - os: macos-12            # ← FIXED: was 'macos-latest' (typo)
            artifact_name: Voxxera-POS-macOS
            artifact_ext: "*.dmg"

    steps:
      # ── Source ─────────────────────────────────────────────────────────────
      - name: Checkout Code
        uses: actions/checkout@v4

      # ── Runtime setup ──────────────────────────────────────────────────────
      - name: Setup PHP 8.2
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.2'
          extensions: mysqli, bcmath, intl, gd, zip, mbstring, curl, xml, pdo, pdo_mysql, pdo_sqlite, fileinfo, tokenizer, openssl
          coverage: none

      - name: Setup Node.js 22
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      # ── Dependency cache ───────────────────────────────────────────────────
      - name: Cache Node Modules
        uses: actions/cache@v4
        with:
          path: node_modules
          key: ${{ runner.os }}-node-${{ hashFiles('package-lock.json', 'package.json') }}
          restore-keys: ${{ runner.os }}-node-

      - name: Cache Composer
        uses: actions/cache@v4
        with:
          path: vendor
          key: ${{ runner.os }}-composer-${{ hashFiles('composer.lock') }}
          restore-keys: ${{ runner.os }}-composer-

      # ── Install dependencies ───────────────────────────────────────────────
      - name: Install Composer Dependencies
        run: composer install --no-dev --optimize-autoloader --no-interaction

      - name: Install NPM Dependencies
        run: npm install

      # ── Bundle portable PHP (Windows) ──────────────────────────────────────
      # shivammathur/setup-php already installed PHP with all required
      # extensions.  We copy the ENTIRE PHP directory (exe + DLLs + ext/)
      # so the bundled PHP is fully self-contained.
      - name: Bundle Portable PHP (Windows)
        if: matrix.os == 'windows-latest'
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force -Path desktop/bin/php | Out-Null

          # Locate the PHP installation directory installed by shivammathur
          $phpExe = (Get-Command php).Source
          $phpDir = Split-Path $phpExe -Parent
          Write-Host "Copying PHP from: $phpDir"

          # Copy everything: php.exe, php.ini, DLLs, ext/ subfolder, etc.
          Copy-Item "$phpDir\*" "desktop\bin\php\" -Recurse -Force

          # Verify the bundled binary works
          & "desktop\bin\php\php.exe" -v
          Write-Host "PHP bundled successfully ✔"

          # Create a minimal php.ini that enables all extensions we need
          $ini = @"
          extension_dir = "ext"
          extension=mysqli
          extension=pdo_mysql
          extension=pdo_sqlite
          extension=mbstring
          extension=curl
          extension=gd
          extension=intl
          extension=zip
          extension=fileinfo
          extension=openssl
          "@
          # Append to existing php.ini rather than replace it
          Add-Content "desktop\bin\php\php.ini" $ini
          Write-Host "php.ini updated ✔"

      # ── Bundle portable PHP (macOS) ────────────────────────────────────────
      # shivammathur puts PHP at $(which php).  For macOS we copy the binary;
      # required shared libs are usually in the system dyld cache already.
      - name: Bundle System PHP (macOS)
        if: matrix.os == 'macos-12'      # ← FIXED: was 'macos-latest'
        run: |
          mkdir -p desktop/bin/php
          PHP_BIN=$(which php)
          PHP_DIR=$(dirname "$PHP_BIN")
          echo "Copying PHP from: $PHP_DIR"
          cp "$PHP_BIN" desktop/bin/php/php
          chmod +x desktop/bin/php/php

          # Copy extension directory if it exists alongside the binary
          EXT_DIR="$PHP_DIR/../lib/php/extensions"
          if [ -d "$EXT_DIR" ]; then
            mkdir -p desktop/bin/php/ext
            cp -r "$EXT_DIR"/no-debug-*/* desktop/bin/php/ext/ 2>/dev/null || true
          fi

          desktop/bin/php/php -v
          echo "PHP bundled ✔"

      # ── Build Electron installers ──────────────────────────────────────────
      - name: Build Desktop App (Windows)
        if: matrix.os == 'windows-latest'
        shell: pwsh
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          NODE_OPTIONS: "--max-old-space-size=8192"
        run: npx electron-builder --win --x64 --publish never

      - name: Build Desktop App (macOS)
        if: matrix.os == 'macos-12'
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          CSC_IDENTITY_AUTO_DISCOVERY: false
          NODE_OPTIONS: "--max-old-space-size=8192"
        run: npx electron-builder --mac --x64 --publish never

      # ── Verify output ──────────────────────────────────────────────────────
      - name: Verify build output
        shell: bash
        run: |
          echo "=== dist-desktop contents ==="
          ls -lh dist-desktop/ 2>/dev/null || echo "ERROR: dist-desktop not found!"
          # Fail the job if no installer was produced
          if [ -z "$(ls dist-desktop/*.exe dist-desktop/*.dmg 2>/dev/null)" ]; then
            echo "No installer found — build failed."
            exit 1
          fi

      # ── Upload artifacts (always, so you can download from Actions UI) ─────
      - name: Upload Build Artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact_name }}
          path: dist-desktop/${{ matrix.artifact_ext }}
          if-no-files-found: error
          retention-days: 30

      # ── Resolve the tag to attach the release to ───────────────────────────
      - name: Resolve release tag
        id: resolve_tag
        shell: bash
        run: |
          if [[ "${{ github.event_name }}" == "workflow_dispatch" && -n "${{ github.event.inputs.version_tag }}" ]]; then
            echo "tag=${{ github.event.inputs.version_tag }}" >> "$GITHUB_OUTPUT"
          elif [[ "${{ github.ref }}" == refs/tags/* ]]; then
            echo "tag=${GITHUB_REF#refs/tags/}" >> "$GITHUB_OUTPUT"
          else
            # Triggered from main/master → use the tag auto_tag just created
            echo "tag=${{ needs.auto_tag.outputs.new_tag }}" >> "$GITHUB_OUTPUT"
          fi

      # ── Attach installer to GitHub Release ────────────────────────────────
      - name: Attach to GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.resolve_tag.outputs.tag }}
          name: "Voxxera POS ${{ steps.resolve_tag.outputs.tag }}"
          draft: false
          prerelease: false
          generate_release_notes: true
          files: |
            dist-desktop/*.exe
            dist-desktop/*.dmg
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
