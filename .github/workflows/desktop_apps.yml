name: Desktop Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    name: Build for ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    timeout-minutes: 60

    strategy:
      fail-fast: false
      matrix:
        include:
          - os: windows-latest
            artifact_name: Voxxera-POS-Windows
            artifact_ext: "*.exe"
          - os: macos-latest
            artifact_name: Voxxera-POS-macOS
            artifact_ext: "*.dmg"

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup PHP 8.2
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.2'
          extensions: mysqli, bcmath, intl, gd, zip, mbstring, curl, xml
          coverage: none

      - name: Setup Node.js 22
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Cache Node Modules
        uses: actions/cache@v4
        with:
          path: node_modules
          key: ${{ runner.os }}-node-${{ hashFiles('package.json') }}
          restore-keys: ${{ runner.os }}-node-

      - name: Install Composer Dependencies
        run: composer install --no-dev --optimize-autoloader --no-interaction

      - name: Install NPM Dependencies
        run: npm install

      # ── Windows: copy PHP that shivammathur/setup-php already installed ──────
      - name: Bundle Portable PHP (Windows)
        if: matrix.os == 'windows-latest'
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force -Path desktop/bin/php | Out-Null
          # shivammathur/setup-php installs PHP into a known directory on Windows runners
          $phpExe = (Get-Command php).Source
          $phpDir = Split-Path $phpExe -Parent
          Write-Host "Copying PHP from: $phpDir"
          Copy-Item "$phpDir\*" "desktop\bin\php\" -Recurse -Force
          & "desktop\bin\php\php.exe" -v
          Write-Host "PHP bundled successfully"

      # ── macOS: copy the system PHP (already set up by shivammathur) ─────────
      - name: Bundle System PHP (macOS)
        if: matrix.os == 'macos-latest'
        run: |
          mkdir -p desktop/bin/php
          PHP_BIN=$(which php)
          echo "Copying PHP from: $PHP_BIN"
          cp "$PHP_BIN" desktop/bin/php/php
          chmod +x desktop/bin/php/php
          desktop/bin/php/php -v

      # ── Build Electron installers ────────────────────────────────────────────
      - name: Build Desktop App (Windows)
        if: matrix.os == 'windows-latest'
        shell: pwsh
        run: npx electron-builder --win --x64 --publish never
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          NODE_OPTIONS: "--max-old-space-size=8192"

      - name: Build Desktop App (macOS)
        if: matrix.os == 'macos-latest'
        # Build x64 only on CI to avoid OOM — universal builds need too much RAM
        run: npx electron-builder --mac --x64 --publish never
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          CSC_IDENTITY_AUTO_DISCOVERY: false
          NODE_OPTIONS: "--max-old-space-size=8192"

      # ── Debug: list generated files ─────────────────────────────────────────
      - name: List Output Files
        shell: bash
        run: |
          echo "=== dist-desktop contents ==="
          ls -lh dist-desktop/ 2>/dev/null || echo "dist-desktop not found!"

      # ── Upload artifacts only on tag-triggered builds (saves quota) ──────────
      - name: Upload Artifact
        if: startsWith(github.ref, 'refs/tags/')
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact_name }}
          path: dist-desktop/${{ matrix.artifact_ext }}
          if-no-files-found: error
          retention-days: 30

      # ── Attach to GitHub Release when triggered by a version tag ────────────
      - name: Attach to GitHub Release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: |
            dist-desktop/*.exe
            dist-desktop/*.dmg
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
