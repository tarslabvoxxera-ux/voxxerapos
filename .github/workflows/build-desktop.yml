name: Build Desktop Apps

on:
  push:
    branches: [main]
    tags: ['v*.*.*']
    paths-ignore:
      - '**/*.md'
      - '.travis.yml'
      - 'docker*'
      - 'Dockerfile'
  pull_request:
    branches: [main]
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

permissions:
  contents: write

jobs:
  # ─────────────────────────────────────────────
  #  Matrix: one job per target platform
  # ─────────────────────────────────────────────
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: windows-latest
            platform: win
            artifact-name: Voxxera-POS-Windows
            artifact-glob: desktop/dist/*.exe

          # macos-latest = available on free tier (Apple Silicon M-series)
          # x64 DMG also runs on Intel Macs; arm64 runs natively on Apple Silicon
          - os: macos-latest
            platform: mac
            artifact-name: Voxxera-POS-Mac
            artifact-glob: desktop/dist/*.dmg

    runs-on: ${{ matrix.os }}
    name: Build (${{ matrix.platform }})

    steps:
      # ── 1. Checkout ──────────────────────────
      - name: Checkout Code
        uses: actions/checkout@v4

      # ── 2. PHP (for Composer only) ───────────
      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.1'
          extensions: mbstring, intl, sqlite3, pdo, pdo_sqlite
          tools: composer:v2
          coverage: none

      # ── 3. Composer cache ────────────────────
      - name: Cache Composer Packages
        uses: actions/cache@v4
        with:
          path: vendor
          key: ${{ runner.os }}-composer-${{ hashFiles('**/composer.lock') }}
          restore-keys: ${{ runner.os }}-composer-

      - name: Install PHP Dependencies
        run: composer install --no-dev --optimize-autoloader --no-interaction --prefer-dist

      # ── 4. Node.js ───────────────────────────
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      # ── 5. Cache Electron binary ─────────────
      - name: Cache Electron
        uses: actions/cache@v4
        with:
          path: |
            ~/.cache/electron
            ~/Library/Caches/electron
            ~\AppData\Local\electron\Cache
          key: electron-${{ runner.os }}-${{ hashFiles('desktop/package-lock.json') }}

      # ── 6. Install Electron deps ─────────────
      - name: Install Electron Dependencies
        working-directory: ./desktop
        # --ignore-scripts skips the postinstall electron-builder hook which
        # requires native tooling only available after the full install
        run: npm install --ignore-scripts

      # ── 7a. Portable PHP – Windows ───────────
      - name: Download Portable PHP (Windows)
        if: matrix.platform == 'win'
        shell: pwsh
        run: |
          $phpDir = "desktop\bin\win"
          New-Item -ItemType Directory -Force -Path $phpDir | Out-Null

          # PHP 8.1 NTS x64 – non-thread-safe for embedded use
          $phpUrl  = "https://windows.php.net/downloads/releases/archives/php-8.1.28-nts-Win32-vs16-x64.zip"
          $zipFile = "php-win.zip"

          Write-Host "Downloading portable PHP for Windows..."
          Invoke-WebRequest -Uri $phpUrl -OutFile $zipFile -UseBasicParsing
          Expand-Archive -Path $zipFile -DestinationPath $phpDir -Force
          Remove-Item $zipFile

          # Copy a stock php.ini that enables needed extensions
          if (Test-Path "$phpDir\php.ini-production") {
            Copy-Item "$phpDir\php.ini-production" "$phpDir\php.ini"
            # Enable required extensions
            (Get-Content "$phpDir\php.ini") `
              -replace ';extension=pdo_sqlite', 'extension=pdo_sqlite' `
              -replace ';extension=sqlite3',   'extension=sqlite3'    `
              -replace ';extension=mbstring',  'extension=mbstring'   `
              -replace ';extension=intl',      'extension=intl'       `
            | Set-Content "$phpDir\php.ini"
          }

          if (-not (Test-Path "$phpDir\php.exe")) {
            Write-Error "php.exe was not found after extraction."
            exit 1
          }
          & "$phpDir\php.exe" --version

      # ── 7b. Portable PHP – macOS ─────────────
      - name: Download Portable PHP (macOS)
        if: matrix.platform == 'mac'
        run: |
          set -e
          mkdir -p desktop/bin/mac

          # static-php-cli bulk builds – PHP 8.1 CLI, macOS x86_64
          # Check https://dl.static-php.dev/static-php-cli/bulk/ for latest version
          PHP_URL="https://dl.static-php.dev/static-php-cli/common/php-8.1.28-cli-macos-x86_64.tar.gz"
          FALLBACK_URL="https://dl.static-php.dev/static-php-cli/common/php-8.1.28-cli-macos-aarch64.tar.gz"

          echo "Downloading portable PHP for macOS..."
          if ! curl -fsSL "$PHP_URL" -o php.tar.gz; then
            echo "Primary URL failed, trying fallback..."
            curl -fsSL "$FALLBACK_URL" -o php.tar.gz
          fi

          tar -xzf php.tar.gz -C desktop/bin/mac/
          rm php.tar.gz

          # Normalize: ensure a file named exactly "php" exists
          PHP_BIN=$(find desktop/bin/mac -maxdepth 1 -type f -perm +111 | head -1)
          if [ -z "$PHP_BIN" ]; then
            echo "ERROR: No executable PHP binary found after extraction."
            ls -la desktop/bin/mac/
            exit 1
          fi
          BASENAME=$(basename "$PHP_BIN")
          if [ "$BASENAME" != "php" ]; then
            mv "$PHP_BIN" desktop/bin/mac/php
          fi
          chmod +x desktop/bin/mac/php
          desktop/bin/mac/php --version

      # ── 8. Build ─────────────────────────────
      - name: Build Windows App
        if: matrix.platform == 'win'
        working-directory: ./desktop
        run: npm run dist:win

      - name: Build macOS App
        if: matrix.platform == 'mac'
        working-directory: ./desktop
        run: npm run dist:mac

      # ── 9. Upload artifact ───────────────────
      - name: Upload Build Artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact-name }}
          path: ${{ matrix.artifact-glob }}
          if-no-files-found: error
          retention-days: 30

  # ─────────────────────────────────────────────
  #  Release: runs only when a vX.Y.Z tag is pushed
  # ─────────────────────────────────────────────
  release:
    name: Create GitHub Release
    needs: build
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v')
    permissions:
      contents: write

    steps:
      - name: Download All Artifacts
        uses: actions/download-artifact@v4
        with:
          path: dist/

      - name: List release files
        run: find dist/ -type f

      - name: Publish GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: dist/**/*
          generate_release_notes: true
          draft: false
          prerelease: ${{ contains(github.ref, '-beta') || contains(github.ref, '-rc') || contains(github.ref, '-alpha') }}
