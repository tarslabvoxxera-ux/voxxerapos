name: Distributable Build

on:
  push:
    branches: [ master, main ]
  pull_request:
    branches: [ master, main ]
  workflow_dispatch:

jobs:
  build:
    name: Build on ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    timeout-minutes: 30

    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]

    steps:
    - name: Checkout Code
      uses: actions/checkout@v4

    - name: Setup PHP
      uses: shivammathur/setup-php@v2
      with:
        php-version: '8.2'
        extensions: mysqli, bcmath, intl, gd, zip, mbstring, curl, xml
        coverage: none

    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '22'

    - name: Cache Composer dependencies
      uses: actions/cache@v4
      with:
        path: vendor
        key: ${{ runner.os }}-composer-${{ hashFiles('composer.lock') }}
        restore-keys: |
          ${{ runner.os }}-composer-

    - name: Install Composer Dependencies
      run: composer install --no-dev --no-ansi --no-interaction --no-progress --optimize-autoloader

    # Use npm install (not ci) because package-lock.json may not include moment yet
    - name: Install NPM Dependencies
      run: npm install

    # Run each gulp task individually so failures are visible and isolated
    - name: Gulp - Clean
      run: npx gulp clean

    - name: Gulp - Copy Bootswatch Themes
      run: npx gulp copy-bootswatch

    - name: Gulp - Copy Bootswatch 5 Themes
      run: npx gulp copy-bootswatch5

    - name: Gulp - Copy Bootstrap
      run: npx gulp copy-bootstrap

    - name: Gulp - Build Production JS
      run: npx gulp prod-js

    - name: Gulp - Build Production CSS
      run: npx gulp prod-css

    - name: Gulp - Copy Fonts
      run: npx gulp copy-fonts

    - name: Gulp - Copy Menubar Icons
      run: npx gulp copy-menubar

    - name: Gulp - Build Database SQL
      run: npx gulp build-database

    - name: Gulp - Create ZIP Package
      run: npx gulp compress

    - name: Upload Artifact
      uses: actions/upload-artifact@v4
      with:
        name: voxxera-pos-${{ matrix.os }}
        path: dist/opensourcepos.zip
        if-no-files-found: error
