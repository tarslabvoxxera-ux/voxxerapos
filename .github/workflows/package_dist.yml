name: Distributable Build

on:
  push:
    branches: [ master, main ]
  pull_request:
    branches: [ master, main ]
  workflow_dispatch:

jobs:
  build:
    name: Build on ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]

    steps:
    - name: Checkout Code
      uses: actions/checkout@v4

    - name: Setup PHP
      uses: shivammathur/setup-php@v2
      with:
        php-version: '8.2'
        extensions: mysqli, bcmath, intl, gd, zip, mbstring, curl, xml
        coverage: none

    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '20'

    - name: Install Composer Dependencies
      run: composer install --no-ansi --no-interaction --no-progress --optimize-autoloader

    - name: Install NPM Dependencies
      run: npm install

    - name: Run Gulp Build
      run: npm run build

    - name: Create Package
      run: npx gulp compress

    - name: Upload Artifact
      uses: actions/upload-artifact@v4
      with:
        name: opensourcepos-${{ matrix.os }}
        path: dist/opensourcepos.zip
        if-no-files-found: error
